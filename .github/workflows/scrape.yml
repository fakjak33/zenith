name: Nightly scrape

on:
  schedule:
    - cron: "30 2 * * *"      # ~02:30 UTC ≈ US evening (previous day)
  workflow_dispatch:           # allow manual runs

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Zenith scrape
        run: python -m zenith.scrape

      - name: Commit updated data
        run: |
          git config user.name "zenith-bot"
          git config user.email "zenith-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new items today."
          else
            git commit -m "data: nightly scrape $(date -u +%Y-%m-%d)"
            git push
          fi
