name: Weekly Brief

on:
  schedule:
    - cron: "0 13 * * 6"        # Saturday 13:00 UTC — after the week's close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Weekly Brief
        run: python -m zenith.brief.compute

      - name: Commit brief data
        run: |
          git config user.name "zenith-bot"
          git config user.email "zenith-bot@users.noreply.github.com"
          git add data/brief/
          if git diff --cached --quiet; then
            echo "No brief changes."
          else
            git commit -m "brief: $(date -u +%Y-%m-%d) weekly"
            git push
          fi
